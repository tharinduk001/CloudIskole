name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Runs before anything else: a leaked secret is the one failure that
      # cannot be undone by a follow-up commit.
      - name: Guard secrets
        run: npm run guard:secrets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          # Public, non-sensitive placeholders — the build only needs these to
          # parse as valid, it never contacts Supabase at build time.
          NEXT_PUBLIC_SITE_URL: https://cloudiskole.lk
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
